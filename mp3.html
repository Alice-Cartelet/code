<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>MP3信息清理工具</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: "Inter", sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #2c2c54);
  color: white;
  text-align: center;
  padding: 40px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 16px;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h1 {
  font-weight: 600;
  margin-bottom: 20px;
}

.drop {
  border: 2px dashed rgba(255,255,255,0.3);
  padding: 40px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

.drop:hover {
  border-color: #4da3ff;
  background: rgba(255,255,255,0.05);
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #4da3ff;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #2d8cff;
}

#status {
  margin-top: 15px;
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">
  <h1>🎵 MP3 清理工具 Pro</h1>

  <div class="drop" id="drop">
    拖拽 MP3 到这里 或 点击选择
    <input type="file" id="file" accept=".mp3" multiple hidden>
  </div>

  <button onclick="process()">开始处理</button>

  <div id="status"></div>
</div>

<!-- 读取 metadata -->
<script src="https://cdn.jsdelivr.net/npm/jsmediatags"></script>

<!-- 写入 metadata -->
<script src="https://cdn.jsdelivr.net/npm/browser-id3-writer"></script>

<script>
let files = [];

const drop = document.getElementById("drop");
const input = document.getElementById("file");
const status = document.getElementById("status");

drop.onclick = () => input.click();

input.onchange = e => {
  files = [...e.target.files];
  status.innerText = `已选择 ${files.length} 个文件`;
};

drop.ondragover = e => {
  e.preventDefault();
  drop.style.borderColor = "#4da3ff";
};

drop.ondrop = e => {
  e.preventDefault();
  files = [...e.dataTransfer.files];
  status.innerText = `已拖入 ${files.length} 个文件`;
};

async function process() {
  if (!files.length) return alert("先选文件");

  status.innerText = "处理中...";

  for (const file of files) {
    const arrayBuffer = await file.arrayBuffer();

    // 读取封面
    let cover = null;

    await new Promise(resolve => {
      new window.jsmediatags.Reader(file)
        .setTagsToRead(["picture"])
        .read({
          onSuccess: tag => {
            if (tag.tags.picture) {
              const pic = tag.tags.picture;
              cover = {
                data: pic.data,
                format: pic.format
              };
            }
            resolve();
          },
          onError: () => resolve()
        });
    });

    // 写入新标签
    const writer = new ID3Writer(arrayBuffer);

    writer.removeTag(); // 清空所有 metadata

    // 👉 只写回封面
    if (cover) {
      writer.setFrame('APIC', {
        type: 3,
        data: new Uint8Array(cover.data),
        description: "cover"
      });
    }

    writer.addTag();

    const blob = writer.getBlob();

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = file.name.replace(".mp3", "_clean.mp3");
    a.click();
  }

  status.innerText = "✅ 完成（已去除信息，保留封面）";
}
</script>

</body>
</html>
