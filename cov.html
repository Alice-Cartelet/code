<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>LRC工具（带偏移）</title>
<style>
body {
    font-family: -apple-system, sans-serif;
    max-width: 900px;
    margin: 40px auto;
    background: #f5f5f5;
}
textarea {
    width: 100%;
    height: 200px;
    margin: 10px 0;
    font-family: monospace;
}
input {
    padding: 6px;
    width: 120px;
}
button {
    padding: 10px 20px;
    margin-right: 10px;
}
</style>
</head>
<body>

<h2>🎤 LRC逐字转换 + 偏移工具</h2>

<p>偏移（毫秒，可负数）：</p>
<input id="offset" value="0">

<p>输入：</p>
<textarea id="input"></textarea>

<button onclick="convert()">转换</button>
<button onclick="download()">下载</button>

<p>输出：</p>
<textarea id="output"></textarea>

<script>
function parseTime(t) {
    let [m, s] = t.split(":");
    return parseInt(m)*60000 + parseFloat(s)*1000;
}

function formatTime(ms) {
    ms = Math.max(0, ms); // 防负数
    let m = Math.floor(ms / 60000);
    let s = (ms % 60000) / 1000;
    return `[${String(m).padStart(2,'0')}:${s.toFixed(3).padStart(6,'0')}]`;
}

function isWordLrc(line) {
    return /^\[?\d+:\d+\.\d+\]/.test(line) &&
           (line.match(/\[\d+:\d+\.\d+\]/g) || []).length >= 2;
}

function extractPairs(line) {
    let regex = /\[(\d+:\d+\.\d+)\]([^\[]?)/g;
    let result = [];
    let match;

    while ((match = regex.exec(line)) !== null) {
        let time = parseTime(match[1]);
        let char = match[2] || "";

        if (char === "" && line[regex.lastIndex] === "[") continue;

        result.push({ time, char });
    }

    return result;
}

function convertLine(line, offset) {
    let pairs = extractPairs(line);
    let valid = pairs.filter(p => p.char !== "");
    if (valid.length < 2) return line;

    pairs.sort((a, b) => a.time - b.time);

    let base = pairs[0].time + offset;

    let chars = [];
    let times = [];

    pairs.forEach(p => {
        if (p.char !== "") {
            chars.push(p.char);
            times.push(p.time + offset);
        }
    });

    let text = chars.join("");

    let tt = "[tt]";
    times.forEach((t, i) => {
        tt += `<${t - base},${i}>`;
    });

    tt += `<${times[times.length - 1] - base}>`;

    return `${formatTime(base)}${text}\n${formatTime(base)}${tt}`;
}

// ⭐ 普通LRC偏移（额外加的）
function shiftNormalLine(line, offset) {
    return line.replace(/\[(\d+:\d+\.\d+)\]/g, (match, t) => {
        let ms = parseTime(t) + offset;
        return formatTime(ms);
    });
}

function convert() {
    let input = document.getElementById("input").value;
    let offset = parseInt(document.getElementById("offset").value) || 0;

    let lines = input.split("\n");

    let result = lines.map(line => {
        if (isWordLrc(line)) {
            return convertLine(line, offset);
        }
        // 普通LRC也偏移
        if (line.includes("[")) {
            return shiftNormalLine(line, offset);
        }
        return line;
    });

    document.getElementById("output").value = result.join("\n");
}

function download() {
    let content = document.getElementById("output").value;
    let blob = new Blob([content], { type: "text/plain" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "output.lrc";
    a.click();
}
</script>

</body>
</html>
