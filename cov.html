<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>LRC逐字转换工具</title>
<style>
body {
    font-family: sans-serif;
    max-width: 900px;
    margin: 40px auto;
    background: #f5f5f5;
}
textarea {
    width: 100%;
    height: 200px;
    margin: 10px 0;
    font-family: monospace;
}
button {
    padding: 10px 20px;
    font-size: 16px;
}
</style>
</head>
<body>

<h2>🎤 逐字LRC → [tt] 转换工具</h2>

<p>输入原始逐字LRC：</p>
<textarea id="input"></textarea>

<button onclick="convert()">转换</button>

<p>输出：</p>
<textarea id="output"></textarea>

<script>
function parseTime(t) {
    let [m, s] = t.split(":");
    return parseInt(m)*60000 + parseFloat(s)*1000;
}

function formatTime(ms) {
    let m = Math.floor(ms / 60000);
    let s = (ms % 60000) / 1000;
    return `[${String(m).padStart(2,'0')}:${s.toFixed(3).padStart(6,'0')}]`;
}

function convertLine(line) {
    let regex = /\[(\d+:\d+\.\d+)\](.)/g;
    let matches = [...line.matchAll(regex)];

    if (matches.length === 0) return line;

    let times = [];
    let chars = [];

    matches.forEach(m => {
        times.push(parseTime(m[1]));
        chars.push(m[2]);
    });

    let base = times[0];
    let text = chars.join("");

    let tt = "[tt]";
    times.forEach((t, i) => {
        tt += `<${t - base},${i}>`;
    });
    tt += `<${times[times.length - 1] - base}>`;

    return `${formatTime(base)}${text}\n${formatTime(base)}${tt}`;
}

function convert() {
    let input = document.getElementById("input").value;
    let lines = input.split("\n");

    let result = lines.map(line => {
        if (line.includes("[") && line.includes("]")) {
            return convertLine(line);
        }
        return line;
    });

    document.getElementById("output").value = result.join("\n");
}
</script>

</body>
</html>
