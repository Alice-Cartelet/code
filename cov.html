<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>LRC 转换工具-适合mac的lyricsX逐字文件转换器</title>
<style>
body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    background: #1e1e2f;
    color: #fff;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

.card {
    background: #2a2a3d;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
}

textarea {
    width: 100%;
    height: 200px;
    background: #111;
    border: none;
    border-radius: 8px;
    padding: 12px;
    color: #0f0;
    font-family: monospace;
    box-sizing: border-box;
}

.center-controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin: 20px 0;
}

input {
    width: 100px;
    padding: 6px;
    border-radius: 6px;
    border: none;
    text-align: center;
}

button {
    background: #4f8cff;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    font-size: 14px;
}

button:hover {
    background: #6aa0ff;
}

.download-btn {
    background: #34c759;
}

.download-btn:hover {
    background: #4cd964;
}

.dropzone {
    border: 2px dashed #444;
    border-radius: 10px;
    padding: 15px;
    text-align: center;
    margin-bottom: 10px;
    font-size: 13px;
    cursor: pointer;
}
</style>
</head>
<body>
<div class="container">
    <h1>🎤 LRC Studio</h1>
    <div class="card">
        <div class="dropzone" id="dropzone">
            拖拽 .lrc 文件到这里 或 粘贴
        </div>
        <textarea id="input" placeholder="输入歌词..."></textarea>
    </div>
    <div class="center-controls">
        偏移(ms)
        <input id="offset" type="number" value="0">
        <button onclick="convert()">转换</button>
        <button class="download-btn" onclick="download()">下载</button>
    </div>
    <div class="card">
        <textarea id="output" placeholder="输出结果..."></textarea>
    </div>
</div>
<script>
const dropzone = document.getElementById("dropzone");
dropzone.ondragover = e => { e.preventDefault(); };
dropzone.ondrop = e => {
    e.preventDefault();
    let file = e.dataTransfer.files[0];
    if (!file) return;
    let reader = new FileReader();
    reader.onload = e => {
        document.getElementById("input").value = e.target.result;
    };
    reader.readAsText(file);
};

function parseTime(t) {
    let [m, s] = t.split(":");
    return parseInt(m) * 60000 + parseFloat(s) * 1000;
}

function formatTime(ms) {
    ms = Math.max(0, ms);
    let m = Math.floor(ms / 60000);
    let s = (ms % 60000) / 1000;
    return `[${String(m).padStart(2,'0')}:${s.toFixed(3).padStart(6,'0')}]`;
}

function isWordLrc(line) {
    return /^\[?\d+:\d+\.\d+\]/.test(line) &&
           (line.match(/\[\d+:\d+\.\d+\]/g) || []).length >= 2;
}

function extractPairs(line) {
    let regex = /\[(\d+:\d+\.\d+)\]([^\[]*)/g;
    let result = [];
    let match;

    while ((match = regex.exec(line)) !== null) {
        let time = parseTime(match[1]);
        let text = match[2] || "";
        // 这里原有的判断逻辑保留，确保提取到行尾最后一个纯时间戳（结束标签）
        if (text === "" && line[regex.lastIndex] === "[") continue;
        result.push({ time, text });
    }

    return result;
}

// 彻底修复结束时间问题
function convertLine(line, offset) {
    let pairs = extractPairs(line);
    if (pairs.length === 0) return line;

    pairs.sort((a, b) => a.time - b.time);

    let words = pairs.filter(p => p.text !== "");
    if (words.length === 0) return line; 

    let base = words[0].time + offset;

    let textStr = "";
    let tt = "[tt]";
    let currentCharIndex = 0;

    words.forEach(w => {
        textStr += w.text;
        let t = w.time + offset;
        tt += `<${t - base},${currentCharIndex}>`;
        currentCharIndex += w.text.length;
    });

    let lastPair = pairs[pairs.length - 1];
    let endTime = lastPair.time + offset;

    // 智能修正结束时间，防止最后一个词被跳过
    if (lastPair.text !== "") {
        endTime += 500; 
    } else if (endTime <= words[words.length - 1].time + offset) {
        endTime = words[words.length - 1].time + offset + 500;
    }

    tt += `<${endTime - base}>`;

    return `${formatTime(base)}${textStr}\n${formatTime(base)}${tt}`;
}

function shiftNormalLine(line, offset) {
    return line.replace(/\[(\d+:\d+\.\d+)\]/g, (match, t) => {
        let ms = parseTime(t) + offset;
        return formatTime(ms);
    });
}

function convert() {
    let input = document.getElementById("input").value;
    let offset = parseInt(document.getElementById("offset").value) || 0;

    if (!input.trim()) {
        alert("请输入或拖入歌词文件！");
        return;
    }

    let lines = input.split("\n");

    let result = lines.map(line => {
        if (isWordLrc(line)) return convertLine(line, offset);
        if (line.includes("[")) return shiftNormalLine(line, offset);
        return line;
    });

    document.getElementById("output").value = result.join("\n");
}

function download() {
    let outputText = document.getElementById("output").value;
    if (!outputText.trim()) {
        alert("没有可下载的内容，请先转换！");
        return;
    }
    let blob = new Blob([outputText], { type: "text/plain;charset=utf-8" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "output.lrc";
    a.click();
    URL.revokeObjectURL(a.href);
}
</script>

</body>
</html>
