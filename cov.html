<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>LRC逐字转换工具-alice</title>
<style>
body {
    font-family: -apple-system, sans-serif;
    max-width: 900px;
    margin: 40px auto;
    background: #f5f5f5;
}
textarea {
    width: 100%;
    height: 220px;
    margin: 10px 0;
    font-family: monospace;
}
button {
    padding: 10px 20px;
    font-size: 16px;
    margin-right: 10px;
}
</style>
</head>
<body>

<h2>🎤 逐字LRC → [tt] 转换工具（稳定版）</h2>

<p>输入：</p>
<textarea id="input"></textarea>

<button onclick="convert()">转换</button>
<button onclick="download()">下载结果</button>

<p>输出：</p>
<textarea id="output"></textarea>

<script>
// 时间解析
function parseTime(t) {
    let [m, s] = t.split(":");
    return parseInt(m)*60000 + parseFloat(s)*1000;
}

// 时间格式化
function formatTime(ms) {
    let m = Math.floor(ms / 60000);
    let s = (ms % 60000) / 1000;
    return `[${String(m).padStart(2,'0')}:${s.toFixed(3).padStart(6,'0')}]`;
}

// 判断是否是逐字LRC
function isWordLrc(line) {
    return /^\[?\d+:\d+\.\d+\]/.test(line) &&
           (line.match(/\[\d+:\d+\.\d+\]/g) || []).length >= 2;
}

// 提取 时间+字符（支持空字符）
function extractPairs(line) {
    let regex = /\[(\d+:\d+\.\d+)\]([^\[]?)/g;
    let result = [];
    let match;

    while ((match = regex.exec(line)) !== null) {
        let time = parseTime(match[1]);
        let char = match[2] || "";

        // 跳过纯空标签（连续[]）
        if (char === "" && line[regex.lastIndex] === "[") continue;

        result.push({ time, char });
    }

    return result;
}

// 转换一行
function convertLine(line) {
    let pairs = extractPairs(line);

    // 至少要2个有效字符
    let valid = pairs.filter(p => p.char !== "");
    if (valid.length < 2) return line;

    // 排序（修复乱序）
    pairs.sort((a, b) => a.time - b.time);

    let base = pairs[0].time;

    let chars = [];
    let times = [];

    pairs.forEach(p => {
        if (p.char !== "") {
            chars.push(p.char);
            times.push(p.time);
        }
    });

    let text = chars.join("");

    let tt = "[tt]";
    times.forEach((t, i) => {
        tt += `<${t - base},${i}>`;
    });

    // 结束时间
    tt += `<${times[times.length - 1] - base}>`;

    return `${formatTime(base)}${text}\n${formatTime(base)}${tt}`;
}

// 主转换
function convert() {
    let input = document.getElementById("input").value;
    let lines = input.split("\n");

    let result = lines.map(line => {
        if (isWordLrc(line)) {
            return convertLine(line);
        }
        return line;
    });

    document.getElementById("output").value = result.join("\n");
}

// 下载文件
function download() {
    let content = document.getElementById("output").value;
    let blob = new Blob([content], { type: "text/plain" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "output.lrc";
    a.click();
}
</script>

</body>
</html>
